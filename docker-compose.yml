version: "3.9"

services:
  # ── PostgreSQL — stores processed datasets ────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wellnesslens
      POSTGRES_PASSWORD: wellnesslens
      POSTGRES_DB: wellnesslens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wellnesslens"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Streamlit Dashboard ───────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://wellnesslens:wellnesslens@db:5432/wellnesslens"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
